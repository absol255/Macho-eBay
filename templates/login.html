<!DOCTYPE html>
<html>
<head>
    <title>Login — Macho eBay</title>

    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/navigation.css">
    <link rel="stylesheet" href="/static/css/buttons.css">
</head>
<body>

    <div class="hero">
        <h1 id="logo">ADMIN LOGIN</h1>
        <p class="subtitle">Admins only.</p>
    </div>

    <nav>
        <a class="nav" href="/">Home</a>
        <a class="nav" href="/selling">Selling</a>
        <a class="nav" href="/login">Admin Login</a>
    </nav>

    <div class="container">
        <div class="card">
            <input type="text" id="username" placeholder="Username" autocomplete="username">
            <input type="password" id="password" placeholder="Password" autocomplete="current-password">
            <button class="button" id="login-btn" type="button">Login</button>
            <p id="login-msg"></p>
        </div>
    </div>

    <script>
    document.getElementById("login-btn").addEventListener("click", function () {
        var msg = document.getElementById("login-msg");
        msg.textContent = "";

        fetch("/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            credentials: "include",
            body: JSON.stringify({
                username: document.getElementById("username").value,
                password: document.getElementById("password").value,
            }),
        })
            .then(function (r) {
                return r.text().then(function (text) {
                    var d = {};
                    try { d = JSON.parse(text); } catch (e) {
                        d = { error: "Server error (" + r.status + "). Check Vercel function logs." };
                    }
                    return { ok: r.ok, d: d };
                });
            })
            .then(function (res) {
                if (res.ok && res.d.success) {
                    window.location.href = "/admin";
                    return;
                }
                msg.textContent = res.d.error || res.d.hint || "Login failed";
            })
            .catch(function () {
                msg.textContent = "Network error — could not reach /api/login";
            });
    });
    </script>

</body>
</html>
